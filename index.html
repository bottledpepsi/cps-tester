<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPS Tester</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>CPS Tester</h1>

    <div class="controls">
        <div>
            <label for="seconds">Test Length (seconds)</label>
            <input type="number" id="seconds" value="5" min="1">
        </div>
        <div>
            <label for="keyInput">Test Key / Mouse Button</label>
            <input type="text" id="keyInput" placeholder="Click here to set key" readonly>
        </div>
        <button id="startButton">Start Test</button>
        <div id="status">Choose a key or mouse button and start the test.</div>
    </div>

    <div id="timer" class="stat">Time: 0.0s</div>
    <div id="cps" class="stat">CPS: 0.00</div>
    <div id="clicks" class="stat">Clicks: 0</div>

    <div id="history">
        <h2>Previous Tests</h2>
        <select id="sorter">
            <option value="completed-desc">Completed (latest first)</option>
            <option value="completed-asc">Completed (oldest first)</option>
            <option value="cps-desc">CPS (highest first)</option>
            <option value="cps-asc">CPS (lowest first)</option>
            <option value="clicks-desc">Clicks (highest first)</option>
            <option value="clicks-asc">Clicks (lowest first)</option>
        </select>

        <div class="history-header">
            <div>Key / Button</div>
            <div>Time</div>
            <div>Clicks</div>
            <div>CPS</div>
            <div>Completed</div>
            <div>Save</div>
        </div>

        <div id="historyList"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
